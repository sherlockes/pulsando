<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsando | Unirse a Clase</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/pwa-icon.png">
    <link rel="apple-touch-icon" href="/pwa-icon.png">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <div class="container">
        <!-- Pantalla Unirse (Alumno) -->
        <div id="screen-join-session" class="card">
            <h1>Pulsando</h1>
            <p class="subtitle">Introduce los datos de tu clase</p>
            <div class="form-group">
                <label for="input-join-class">Nombre de la Clase</label>
                <input type="text" id="input-join-class" placeholder="Ej: Matemáticas">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="input-student-name">Tu Nombre</label>
                    <input type="text" id="input-student-name" maxlength="10" placeholder="Máx 10">
                </div>
                <div class="form-group" style="flex: 0 0 100px;">
                    <label for="input-join-code">PIN</label>
                    <input type="text" id="input-join-code" maxlength="4" placeholder="PIN">
                </div>
            </div>
            <button id="btn-join-session" class="btn btn-secondary">Entrar a Clase</button>
            <div class="text-center mt-4">
                <a href="./teacher.html" style="color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">Acceso Profesor</a>
            </div>
        </div>

        <!-- Pulsador (Alumno) -->
        <div id="screen-student-buzzer" class="card hidden">
            <h1 id="student-display-class">Clase</h1>
            <p class="text-center">Hola, <span id="student-display-name">---</span></p>
            
            <div class="buzzer-container">
                <button id="buzzer-button" class="buzzer">PULSAR</button>
            </div>

            <div id="student-status" class="text-center">
                <span id="student-status-badge" class="status-badge status-waiting">Esperando al profesor...</span>
            </div>

            <div id="student-winner-msg" class="winner-card hidden">
                <p>EL GANADOR ES:</p>
                <span id="student-winner-name" class="winner-name">---</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK & Student Logic -->
    <script type="module" src="./student.js"></script>
</body>
</html>
